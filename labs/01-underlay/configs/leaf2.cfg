! ============================================================
! leaf2 — Session 1 underlay only
! Loopback0: 10.0.0.22/32 (router-id)
! Loopback1: 10.0.1.22/32 (VTEP source; reserved, not yet used)
! ============================================================

hostname leaf2

feature ospf

! ------------------------------------------------------------
! Loopback for router-id
! ------------------------------------------------------------
interface loopback0
  description Router-ID and OSPF source
  ip address 10.0.0.22/32
  ip router ospf UNDERLAY area 0.0.0.0

! ------------------------------------------------------------
! Loopback for VTEP (NVE source)
! ------------------------------------------------------------
interface loopback1
  description VTEP NVE source (used from Session 3)
  ip address 10.0.1.22/32
  ip router ospf UNDERLAY area 0.0.0.0

! ------------------------------------------------------------
! Underlay P2P link to spine1 Eth1/2
! link-id 2, subnet 10.10.2.0/31
! ------------------------------------------------------------
interface Ethernet1/1
  description to spine1 Eth1/2
  no switchport
  mtu 9216
  no shutdown
  ip address 10.10.2.1/31
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0

! ------------------------------------------------------------
! Underlay P2P link to spine2 Eth1/2
! link-id 4, subnet 10.10.4.0/31
! ------------------------------------------------------------
interface Ethernet1/2
  description to spine2 Eth1/2
  no switchport
  mtu 9216
  no shutdown
  ip address 10.10.4.1/31
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0

! ------------------------------------------------------------
! Host-facing interface (unused until Session 3)
! ------------------------------------------------------------
interface Ethernet1/3
  description to host2 (unused in Session 1)
  shutdown

! ------------------------------------------------------------
! OSPF process
! ------------------------------------------------------------
router ospf UNDERLAY
  router-id 10.0.0.22
