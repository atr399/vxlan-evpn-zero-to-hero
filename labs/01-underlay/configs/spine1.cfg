! ============================================================
! spine1 — Session 1 underlay only
! Loopback0: 10.0.0.11/32 (router-id)
! ============================================================

hostname spine1

feature ospf

! ------------------------------------------------------------
! Loopback for router-id
! ------------------------------------------------------------
interface loopback0
  description Router-ID and OSPF source
  ip address 10.0.0.11/32
  ip router ospf UNDERLAY area 0.0.0.0

! ------------------------------------------------------------
! Underlay P2P link to leaf1 Eth1/1
! link-id 1, subnet 10.10.1.0/31
! ------------------------------------------------------------
interface Ethernet1/1
  description to leaf1 Eth1/1
  no switchport
  mtu 9216
  no shutdown
  ip address 10.10.1.0/31
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0

! ------------------------------------------------------------
! Underlay P2P link to leaf2 Eth1/1
! link-id 2, subnet 10.10.2.0/31
! ------------------------------------------------------------
interface Ethernet1/2
  description to leaf2 Eth1/1
  no switchport
  mtu 9216
  no shutdown
  ip address 10.10.2.0/31
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0

! ------------------------------------------------------------
! OSPF process
! ------------------------------------------------------------
router ospf UNDERLAY
  router-id 10.0.0.11
