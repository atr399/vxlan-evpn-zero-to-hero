! ============================================================
! leaf1 — Session 1 underlay only
! Loopback0: 10.0.0.21/32 (router-id)
! Loopback1: 10.0.1.21/32 (VTEP source; reserved, not yet used)
! ============================================================

hostname leaf1

feature ospf

! ------------------------------------------------------------
! Loopback for router-id
! ------------------------------------------------------------
interface loopback0
  description Router-ID and OSPF source
  ip address 10.0.0.21/32
  ip router ospf UNDERLAY area 0.0.0.0

! ------------------------------------------------------------
! Loopback for VTEP (NVE source)
! Reserved now so the VTEP IP is reachable across the underlay
! before NVE is enabled in Session 3.
! ------------------------------------------------------------
interface loopback1
  description VTEP NVE source (used from Session 3)
  ip address 10.0.1.21/32
  ip router ospf UNDERLAY area 0.0.0.0

! ------------------------------------------------------------
! Underlay P2P link to spine1 Eth1/1
! link-id 1, subnet 10.10.1.0/31
! ------------------------------------------------------------
interface Ethernet1/1
  description to spine1 Eth1/1
  no switchport
  mtu 9216
  no shutdown
  ip address 10.10.1.1/31
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0

! ------------------------------------------------------------
! Underlay P2P link to spine2 Eth1/1
! link-id 3, subnet 10.10.3.0/31
! ------------------------------------------------------------
interface Ethernet1/2
  description to spine2 Eth1/1
  no switchport
  mtu 9216
  no shutdown
  ip address 10.10.3.1/31
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0

! ------------------------------------------------------------
! Host-facing interface (unused until Session 3)
! Kept shutdown to make link state honest.
! ------------------------------------------------------------
interface Ethernet1/3
  description to host1 (unused in Session 1)
  shutdown

! ------------------------------------------------------------
! OSPF process
! ------------------------------------------------------------
router ospf UNDERLAY
  router-id 10.0.0.21
