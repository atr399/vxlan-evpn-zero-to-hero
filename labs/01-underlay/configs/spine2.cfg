! ============================================================
! spine2 - Session 1 underlay only
! Loopback0: 10.0.0.12/32 (router-id)
! ============================================================

hostname spine2

feature ospf

! ------------------------------------------------------------
! Loopback for router-id
! ------------------------------------------------------------
interface loopback0
  description Router-ID and OSPF source
  ip address 10.0.0.12/32
  ip router ospf UNDERLAY area 0.0.0.0

! ------------------------------------------------------------
! Underlay P2P link to leaf1 Eth1/2
! link-id 3, subnet 10.10.3.0/31
! ------------------------------------------------------------
interface Ethernet1/1
  description to leaf1 Eth1/2
  no switchport
  mtu 9216
  no shutdown
  ip address 10.10.3.0/31
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0

! ------------------------------------------------------------
! Underlay P2P link to leaf2 Eth1/2
! link-id 4, subnet 10.10.4.0/31
! ------------------------------------------------------------
interface Ethernet1/2
  description to leaf2 Eth1/2
  no switchport
  mtu 9216
  no shutdown
  ip address 10.10.4.0/31
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0

! ------------------------------------------------------------
! OSPF process
! ------------------------------------------------------------
router ospf UNDERLAY
  router-id 10.0.0.12
